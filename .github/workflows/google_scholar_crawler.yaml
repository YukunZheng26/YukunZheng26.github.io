name: Get Citation Data

on:
  page_build:
  schedule:
    - cron: '0 8 * * 1' # 每周一下午 4:00 运行 (UTC 8:00)
  workflow_dispatch: # 允许你在 GitHub 网页上手动点击按钮触发，方便测试

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 8 # 设置超时保护，防止死锁浪费额度
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # 1. 升级到最新 v4，彻底解决卡住问题
      with:
        fetch-depth: 1        # 2. 开启浅克隆，加快速度

    - name: Set up Python
      uses: actions/setup-python@v5 # 3. 官方标准做法：用标准 Action 初始化 Python
      with:
        python-version: '3.x'

    - name: Run Crawler
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        python3 main.py
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        SOCKS_PROXY: ${{ secrets.SOCKS_PROXY }}

    - name: Push Results to Branch
      run: |
        cd ./google_scholar_crawler/results # 确保路径正确
        
        # 初始化并配置 Git
        git init
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        
        # 构筑带有 Token 的远程仓库认证机制
        git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        
        # 提交数据
        git add *.json
        git commit -m "Updated Citation Data"
        
        # 强推到指定分支
        git push origin HEAD:google-scholar-stats --force
